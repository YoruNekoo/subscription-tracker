<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <!-- Card Design Element (Glassmorphism effect in SVG) -->
  <rect x="96" y="140" width="320" height="200" rx="24" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="4" stroke-opacity="0.25" />
  <rect x="96" y="190" width="320" height="40" fill="#0f172a" fill-opacity="0.4" />
  <circle cx="146" cy="280" r="16" fill="#ffffff" fill-opacity="0.8" />
  <circle cx="186" cy="280" r="16" fill="#ffffff" fill-opacity="0.4" />
  
  <!-- Calendar Ring & Badge (Subscription representation) -->
  <rect x="256" y="240" width="160" height="160" rx="32" fill="#0f172a" fill-opacity="0.85" filter="url(#glow)" />
  <!-- Calendar Top Bar -->
  <path d="M256 280 C256 272, 416 272, 416 280 L416 240 L256 240 Z" fill="#ef4444" />
  <!-- Calendar Date Text -->
  <text x="336" y="350" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="70" font-weight="bold" fill="#ffffff" text-anchor="middle">31</text>
  <!-- Ring details -->
  <rect x="290" y="220" width="16" height="30" rx="8" fill="#e2e8f0" />
  <rect x="366" y="220" width="16" height="30" rx="8" fill="#e2e8f0" />
</svg>
